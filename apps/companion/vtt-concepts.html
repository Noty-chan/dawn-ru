<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#11131b">
  <meta name="description" content="Интерактивный тактический кокпит игрового стола DAWN.">
  <title>DAWN · Тактический кокпит</title>
  <link rel="stylesheet" href="vtt-concepts.css">
</head>
<body>
  <header class="prototype-bar">
    <a class="prototype-brand" href="./" aria-label="Вернуться в компаньон DAWN">
      <span class="prototype-mark">D</span>
      <span><strong>DAWN</strong><small>ТАКТИЧЕСКИЙ КОКПИТ</small></span>
    </a>
    <div class="selected-shell"><strong>Выбранный стол</strong><span>поле · живой лист · действия</span></div>
    <div class="prototype-controls">
      <label class="role-switch">Роль
        <select id="role-select">
          <option value="player">Игрок</option>
          <option value="gm">Нарратор</option>
        </select>
      </label>
      <button type="button" id="reset-demo" class="icon-control" aria-label="Сбросить демонстрационный бой" title="Сбросить бой">↺</button>
    </div>
  </header>

  <main id="concept-root" aria-live="polite"></main>
  <div id="surface-root"></div>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="data.js"></script>
  <script src="logic.js"></script>
  <script src="scene-engine.js"></script>
  <script src="technique-engine.js"></script>
  <script src="vtt-concepts.js"></script>
</body>
</html>
